<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Against All Odds — National Festivals V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1115;--surface:#1a1d24;--surface2:#22262f;--surface3:#2d323c;
  --border:#2d323c;--border2:#3d434f;
  --text:#e8eaed;--text2:#9aa0ac;--text3:#6b7280;
  --accent:#7fc67a;--accent-dim:#1f3320;
  --pri-high:#f87171;--pri-med:#fbbf24;--pri-low:#9ca3af;
  --apply:#86efac;--skip:#f87171;--strategic:#fbbf24;
  --radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:24px}

/* Header */
header{display:flex;justify-content:space-between;align-items:flex-end;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:24px;flex-wrap:wrap;gap:16px}
h1{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
h1 .subtitle{display:block;color:var(--accent);font-weight:400;font-size:.8rem;margin-top:4px;letter-spacing:0}
.top-link{display:inline-flex;align-items:center;gap:6px;color:var(--text2);font-size:.8rem;text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px}
.top-link:hover{color:var(--text);border-color:var(--border2)}

/* Summary */
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;text-align:center}
.stat .v{font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:-.02em}
.stat .l{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* Filter bar */
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:200px;padding:9px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:.85rem;outline:none}
.search:focus{border-color:var(--accent)}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:.75rem;font-weight:500;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--accent);color:#0f1115;border-color:var(--accent);font-weight:600}
.sort-group{display:flex;gap:4px;padding:3px;background:var(--surface);border:1px solid var(--border);border-radius:20px}
.sort-group .chip{border:none;padding:4px 12px;background:transparent}
.sort-group .chip.active{background:var(--accent)}

/* Festival Card */
.festivals{display:flex;flex-direction:column;gap:14px}
.fest{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:all .15s}
.fest:hover{border-color:var(--border2)}
.fest-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px}
.fest-title-block{flex:1;min-width:0}
.fest-name{font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.fest-name a{color:inherit;text-decoration:none}
.fest-name a:hover{color:var(--accent)}
.fest-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-size:.75rem;color:var(--text2)}
.fest-meta .state{opacity:.9}
.decision{font-size:.7rem;font-weight:600;padding:2px 10px;border-radius:10px;letter-spacing:.02em}
.d-apply{background:rgba(134,239,172,.12);color:var(--apply)}
.d-skip{background:rgba(248,113,113,.12);color:var(--skip)}
.d-strategic{background:rgba(251,191,36,.12);color:var(--strategic)}
.priority-box{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.priority-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:700;border:2px solid}
.pri-10,.pri-9{background:rgba(134,239,172,.15);color:var(--apply);border-color:var(--apply)}
.pri-8,.pri-7{background:rgba(251,191,36,.12);color:var(--strategic);border-color:var(--strategic)}
.pri-6,.pri-5,.pri-4{background:rgba(156,163,175,.12);color:var(--pri-low);border-color:var(--pri-low)}
.pri-3,.pri-2,.pri-1,.pri-0{background:rgba(248,113,113,.12);color:var(--skip);border-color:var(--skip)}
.priority-label{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}

/* Deadline ladder */
.ladder-wrap{margin-bottom:14px}
.ladder-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:600}
.ladder{display:flex;gap:0;flex-wrap:wrap;position:relative}
.rung{flex:1;min-width:110px;background:var(--surface2);border:1px solid var(--border);padding:9px 12px;position:relative;transition:all .15s}
.rung:first-child{border-top-left-radius:6px;border-bottom-left-radius:6px}
.rung:last-child{border-top-right-radius:6px;border-bottom-right-radius:6px}
.rung:not(:last-child){border-right:none}
.rung.passed{opacity:.4;background:var(--surface)}
.rung.passed .rung-fee{text-decoration:line-through}
.rung.current{background:var(--accent-dim);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.rung.current .rung-fee{color:var(--accent);font-weight:700}
.rung-stage{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:2px}
.rung.current .rung-stage{color:var(--accent)}
.rung-date{font-size:.82rem;font-weight:600;color:var(--text)}
.rung-fee{font-size:.72rem;color:var(--text2);margin-top:2px}
.rung-countdown{font-size:.6rem;color:var(--pri-high);font-weight:600;margin-top:1px}
.ladder-empty{padding:12px;background:var(--surface2);border:1px dashed var(--border2);border-radius:6px;color:var(--text3);font-size:.8rem;text-align:center;font-style:italic}

/* Bottom grid */
.fest-bottom{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:end;padding-top:12px;border-top:1px solid var(--border)}
.format-block{min-width:0}
.format-label{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:600}
.format-text{font-size:.8rem;color:var(--text);line-height:1.45}
.format-text .ellipsis{color:var(--accent);cursor:pointer;font-size:.7rem;font-weight:500;margin-left:4px}
.apply-btn{background:var(--accent);color:#0f1115;padding:9px 18px;border-radius:8px;text-decoration:none;font-size:.82rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s;border:none;cursor:pointer}
.apply-btn:hover{background:#9ad695;transform:translateY(-1px)}
.apply-btn.disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;pointer-events:none}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty p{font-size:.9rem}

/* Responsive */
@media(max-width:700px){
  .app{padding:14px}
  .fest-header{flex-direction:row}
  .rung{min-width:90px}
  .fest-bottom{grid-template-columns:1fr}
  .apply-btn{justify-self:start}
}
</style>

const today = new Date(); today.setHours(0,0,0,0);

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function formatDate(d){
  if(!d) return '—';
  const dt = new Date(d); if(isNaN(dt)) return d;
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function getNextDeadline(f){
  if(!f.deadlines||!f.deadlines.length) return null;
  const future = f.deadlines.filter(d=>d.date && new Date(d.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(future.length) return future[0];
  const withDate = f.deadlines.filter(d=>d.date).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return withDate[0] || null;
}

function daysUntil(d){
  const dt = new Date(d); dt.setHours(0,0,0,0);
  return Math.round((dt-today)/(1000*60*60*24));
}

function priorityClass(p){
  if(p==null) return 'pri-0';
  const n = Math.max(0,Math.min(10,Math.round(p)));
  return 'pri-'+n;
}

function decisionClass(d){
  if(!d) return '';
  const s = d.toLowerCase();
  if(s.includes('skip')) return 'd-skip';
  if(s.includes('strategic')) return 'd-strategic';
  return 'd-apply';
}

function decisionMatches(d, filter){
  if(filter==='all') return true;
  const s = (d||'').toLowerCase();
  if(filter==='priority') return s.includes('priority');
  if(filter==='apply') return s==='apply'||(s.includes('apply')&&!s.includes('priority')&&!s.includes('strategic')&&!s.includes('skip'));
  if(filter==='strategic') return s.includes('strategic');
  if(filter==='skip') return s.includes('skip');
  return true;
}

function renderSummary(){
  const all = FESTIVALS;
  const priority = all.filter(f=>decisionMatches(f.decision,'priority')).length;
  const apply = all.filter(f=>decisionMatches(f.decision,'apply')).length;
  const strategic = all.filter(f=>decisionMatches(f.decision,'strategic')).length;
  const skip = all.filter(f=>decisionMatches(f.decision,'skip')).length;
  const upcoming = all.filter(f=>{
    const n = getNextDeadline(f);
    if(!n||!n.date) return false;
    const d = daysUntil(n.date);
    return d>=0 && d<=30;
  }).length;

  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="v">${all.length}</div><div class="l">Festivals</div></div>
    <div class="stat"><div class="v">${priority}</div><div class="l">Priority</div></div>
    <div class="stat"><div class="v">${apply}</div><div class="l">Apply</div></div>
    <div class="stat"><div class="v">${strategic}</div><div class="l">Strategic</div></div>
    <div class="stat"><div class="v">${skip}</div><div class="l">Skip</div></div>
    <div class="stat"><div class="v">${upcoming}</div><div class="l">Due in 30d</div></div>
  `;
}

function render(){
  let list = FESTIVALS.filter(f=>decisionMatches(f.decision, currentFilter));
  if(searchTerm){
    const t = searchTerm.toLowerCase();
    list = list.filter(f=>f.name.toLowerCase().includes(t)||(f.state||'').toLowerCase().includes(t));
  }

  list.sort((a,b)=>{
    if(currentSort==='priority'){
      const pa=a.priority==null?-1:a.priority, pb=b.priority==null?-1:b.priority;
      return pb-pa;
    }
    const na = getNextDeadline(a), nb = getNextDeadline(b);
    const da = na&&na.date ? new Date(na.date).getTime() : Infinity;
    const db = nb&&nb.date ? new Date(nb.date).getTime() : Infinity;
    return da-db;
  });

  const el = document.getElementById('festivalsList');
  if(!list.length){
    el.innerHTML = '<div class="empty"><p>No festivals match your filters</p></div>';
    return;
  }

  el.innerHTML = list.map(f=>{
    const next = getNextDeadline(f);
    const nextDateStr = next && next.date ? new Date(next.date) : null;

    // Ladder
    let ladderHtml = '';
    if(f.deadlines && f.deadlines.length){
      const sorted = [...f.deadlines].sort((a,b)=>{
        if(!a.date) return 1; if(!b.date) return -1;
        return new Date(a.date)-new Date(b.date);
      });
      ladderHtml = '<div class="ladder">' + sorted.map(dl=>{
        let cls = '';
        let countdown = '';
        if(dl.date){
          const days = daysUntil(dl.date);
          if(days<0) cls='passed';
          else if(next && dl.date===next.date && days>=0) {
            cls='current';
            if(days===0) countdown='<div class="rung-countdown">Today</div>';
            else if(days===1) countdown='<div class="rung-countdown">Tomorrow</div>';
            else if(days<=14) countdown=`<div class="rung-countdown">${days} days left</div>`;
          }
        }
        const feeStr = dl.fee!=null ? '$'+(Number.isInteger(dl.fee)?dl.fee:dl.fee.toFixed(2)) : (dl.fee===0 ? 'Free' : '—');
        return `<div class="rung ${cls}">
          <div class="rung-stage">${esc(dl.stage)}</div>
          <div class="rung-date">${formatDate(dl.date)}</div>
          <div class="rung-fee">${feeStr}</div>
          ${countdown}
        </div>`;
      }).join('') + '</div>';
    } else {
      ladderHtml = '<div class="ladder-empty">Deadline info not yet available</div>';
    }

    const priClass = priorityClass(f.priority);
    const priVal = f.priority==null ? '—' : f.priority;
    const decCls = decisionClass(f.decision);
    const decText = f.decision || '';

    const applyDisabled = !f.registrationLink;
    const applyBtn = applyDisabled
      ? `<span class="apply-btn disabled">No link</span>`
      : `<a class="apply-btn" href="${esc(f.registrationLink)}" target="_blank" rel="noopener">Apply now \u2192</a>`;

    return `<div class="fest">
      <div class="fest-header">
        <div class="fest-title-block">
          <div class="fest-name">${f.registrationLink
              ? `<a href="${esc(f.registrationLink)}" target="_blank" rel="noopener">${esc(f.name)}</a>`
              : esc(f.name)}</div>
          <div class="fest-meta">
            <span class="state">${esc(f.state||'')}</span>
            ${decText?`<span class="decision ${decCls}">${esc(decText)}</span>`:''}
          </div>
        </div>
        <div class="priority-box">
          <div class="priority-circle ${priClass}">${priVal}</div>
          <div class="priority-label">Priority</div>
        </div>
      </div>
      <div class="ladder-wrap">
        <div class="ladder-label">Deadlines & Fees</div>
        ${ladderHtml}
      </div>
      <div class="fest-bottom">
        <div class="format-block">
          <div class="format-label">Format Accepted (for application)</div>
          <div class="format-text">${esc(f.formatApply||'')}</div>
        </div>
        ${applyBtn}
      </div>
    </div>`;
  }).join('');
}

// Events
document.getElementById('searchInput').addEventListener('input', e=>{
  searchTerm = e.target.value;
  render();
});

document.querySelectorAll('.chip[data-filter]').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('.chip[data-filter]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    currentFilter = c.dataset.filter;
    render();
  });
});

document.querySelectorAll('.chip[data-sort]').forEach(c=>{
  c.addEventListener('click', ()=>{
    document.querySelectorAll('.chip[data-sort]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    currentSort = c.dataset.sort;
    render();
  });
});

renderSummary();
render();
</script>
</body>
</html>
