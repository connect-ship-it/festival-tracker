<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Against All Odds — National Festivals V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1115;--surface:#1a1d24;--surface2:#22262f;--surface3:#2d323c;
  --border:#2d323c;--border2:#3d434f;
  --text:#e8eaed;--text2:#9aa0ac;--text3:#6b7280;
  --accent:#7fc67a;--accent-dim:#1f3320;
  --apply:#86efac;--skip:#f87171;--strategic:#fbbf24;
  --radius:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.4;min-height:100vh;overflow:hidden}
.app{max-width:100vw;margin:0 auto;padding:16px 20px;height:100vh;display:flex;flex-direction:column}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap;gap:10px}
h1{font-size:1.15rem;font-weight:700;letter-spacing:-.02em}
h1 .subtitle{color:var(--accent);font-weight:400;font-size:.72rem;margin-left:8px;letter-spacing:0}
.top-link{display:inline-flex;align-items:center;gap:5px;color:var(--text2);font-size:.72rem;text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:5px}
.top-link:hover{color:var(--text);border-color:var(--border2)}

/* Summary — single compact row */
.summary{display:flex;gap:16px;flex-wrap:wrap;font-size:.75rem;margin-bottom:10px;padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px}
.summary span{color:var(--text2)}
.summary span b{color:var(--accent);font-weight:700;margin-right:3px;font-size:.85rem}

/* Controls */
.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.search{flex:0 0 220px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-size:.78rem;outline:none}
.search:focus{border-color:var(--accent)}
.chip{padding:4px 11px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:.7rem;font-weight:500;white-space:nowrap}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--accent);color:#0f1115;border-color:var(--accent);font-weight:600}
.sort-label{font-size:.7rem;color:var(--text3);margin-left:6px}
.sort-group{display:flex;gap:2px;padding:2px;background:var(--surface);border:1px solid var(--border);border-radius:14px}
.sort-group .chip{border:none;padding:3px 10px;background:transparent}
.sort-group .chip.active{background:var(--accent)}

/* Table wrapper */
.table-wrap{flex:1;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);position:relative;min-height:0}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:.78rem}
thead{position:sticky;top:0;z-index:20}
th{background:var(--surface2);padding:10px 12px;text-align:left;font-weight:600;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);border-bottom:1px solid var(--border2);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text);background:var(--surface3)}
th.sorted{color:var(--accent)}
th .arrow{opacity:.5;margin-left:3px;font-size:.6rem}
th.sorted .arrow{opacity:1}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:var(--surface2)}
tbody tr:last-child td{border-bottom:none}

/* Sticky first column */
th.c-name,td.c-name{position:sticky;left:0;z-index:22;background:var(--surface);border-right:1px solid var(--border)}
tbody tr:hover td.c-name{background:var(--surface2)}
th.c-name{background:var(--surface2);z-index:32;border-right:1px solid var(--border2)}

/* Column widths */
.c-pri{width:50px;text-align:center}
.c-name{min-width:260px;max-width:320px}
.c-name strong{display:block;font-weight:600;color:var(--text);font-size:.82rem;line-height:1.25;margin-bottom:2px}
.c-name strong a{color:inherit;text-decoration:none}
.c-name strong a:hover{color:var(--accent)}
.c-name .sub{display:flex;gap:8px;font-size:.7rem;color:var(--text2);align-items:center}
.c-decision{width:110px}
.c-deadlines{min-width:380px}
.c-format{min-width:240px;max-width:320px}
.c-apply{width:100px;text-align:right;position:sticky;right:0;background:var(--surface);z-index:25;border-left:1px solid var(--border)}
tbody tr:hover td.c-apply{background:var(--surface2)}
th.c-apply{background:var(--surface2);position:sticky;right:0;z-index:35;border-left:1px solid var(--border2)}

/* Priority circle compact */
.pri-circle{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:.82rem;font-weight:700;border:2px solid}
.pri-10,.pri-9{background:rgba(134,239,172,.15);color:var(--apply);border-color:var(--apply)}
.pri-8,.pri-7{background:rgba(251,191,36,.12);color:var(--strategic);border-color:var(--strategic)}
.pri-6,.pri-5,.pri-4{background:rgba(156,163,175,.12);color:var(--text2);border-color:var(--text3)}
.pri-3,.pri-2,.pri-1,.pri-0{background:rgba(248,113,113,.12);color:var(--skip);border-color:var(--skip)}
.pri-null{background:var(--surface2);color:var(--text3);border-color:var(--border2)}

/* Decision pill */
.decision{display:inline-block;font-size:.65rem;font-weight:600;padding:2px 9px;border-radius:10px;letter-spacing:.02em;white-space:nowrap}
.d-apply{background:rgba(134,239,172,.12);color:var(--apply)}
.d-skip{background:rgba(248,113,113,.12);color:var(--skip)}
.d-strategic{background:rgba(251,191,36,.12);color:var(--strategic)}

/* Inline deadline chips */
.deadlines-row{display:flex;gap:4px;flex-wrap:wrap}
.dl{display:inline-flex;flex-direction:column;align-items:flex-start;padding:4px 8px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);min-width:72px;line-height:1.15;font-size:.7rem}
.dl.passed{opacity:.35}
.dl.passed .dl-fee{text-decoration:line-through}
.dl.current{background:var(--accent-dim);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.dl.current .dl-fee{color:var(--accent);font-weight:700}
.dl-stage{font-size:.55rem;text-transform:uppercase;color:var(--text3);letter-spacing:.05em;font-weight:600}
.dl.current .dl-stage{color:var(--accent)}
.dl-date{color:var(--text);font-weight:600;font-size:.72rem;margin-top:1px}
.dl-fee{color:var(--text2);font-size:.68rem}
.no-dl{color:var(--text3);font-style:italic;font-size:.72rem}

/* Format text (truncated) */
.format-text{color:var(--text);font-size:.72rem;line-height:1.4;max-height:42px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;cursor:help;position:relative}
.format-text:hover{max-height:none;-webkit-line-clamp:unset;background:var(--surface3);position:relative;z-index:12;padding:6px 8px;margin:-6px -8px;border-radius:4px;box-shadow:0 4px 12px rgba(0,0,0,.5)}

/* Apply button */
.apply-btn{background:var(--accent);color:#0f1115;padding:6px 12px;border-radius:5px;text-decoration:none;font-size:.72rem;font-weight:600;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;transition:all .12s;border:none;cursor:pointer}
.apply-btn:hover{background:#9ad695}
.apply-btn.disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed;pointer-events:none}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--text2);font-size:.85rem}

/* Scrollbar */
.table-wrap::-webkit-scrollbar{width:10px;height:10px}
.table-wrap::-webkit-scrollbar-track{background:var(--surface)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:5px}
.table-wrap::-webkit-scrollbar-thumb:hover{background:var(--border2)}

@media(max-width:700px){
  .app{padding:10px}
  .search{flex:1;min-width:160px}
  .c-format{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>National Festivals<span class="subtitle">Against All Odds &bull; v2</span></h1>

</div>

let currentFilter='all', currentSort='priority', sortDir=-1, searchTerm='';
const today=new Date(); today.setHours(0,0,0,0);

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function formatDate(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'})}
function getNextDeadline(f){
  if(!f.deadlines||!f.deadlines.length)return null;
  const future=f.deadlines.filter(d=>d.date&&new Date(d.date)>=today).sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(future.length)return future[0];
  const withDate=f.deadlines.filter(d=>d.date).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return withDate[0]||null;
}
function daysUntil(d){const dt=new Date(d);dt.setHours(0,0,0,0);return Math.round((dt-today)/(1000*60*60*24))}
function priorityClass(p){if(p==null)return 'pri-null';return 'pri-'+Math.max(0,Math.min(10,Math.round(p)))}
function decisionClass(d){if(!d)return '';const s=d.toLowerCase();if(s.includes('skip'))return 'd-skip';if(s.includes('strategic'))return 'd-strategic';return 'd-apply'}
function decisionMatches(d,f){
  if(f==='all')return true;
  const s=(d||'').toLowerCase();
  if(f==='priority')return s.includes('priority');
  if(f==='apply')return s==='apply'||(s.includes('apply')&&!s.includes('priority')&&!s.includes('strategic'));
  if(f==='strategic')return s.includes('strategic');
  if(f==='skip')return s.includes('skip');
  return true;
}

function renderSummary(){
  const all=FESTIVALS;
  const pri=all.filter(f=>decisionMatches(f.decision,'priority')).length;
  const app=all.filter(f=>decisionMatches(f.decision,'apply')).length;
  const str=all.filter(f=>decisionMatches(f.decision,'strategic')).length;
  const sk=all.filter(f=>decisionMatches(f.decision,'skip')).length;
  const up=all.filter(f=>{const n=getNextDeadline(f);if(!n||!n.date)return false;const d=daysUntil(n.date);return d>=0&&d<=30}).length;
  document.getElementById('summary').innerHTML=`
    <span><b>${all.length}</b>Total</span>
    <span><b>${pri}</b>Priority</span>
    <span><b>${app}</b>Apply</span>
    <span><b>${str}</b>Strategic</span>
    <span><b>${sk}</b>Skip</span>
    <span><b>${up}</b>Due in 30d</span>`;
}

function render(){
  let list=FESTIVALS.filter(f=>decisionMatches(f.decision,currentFilter));
  if(searchTerm){const t=searchTerm.toLowerCase();list=list.filter(f=>f.name.toLowerCase().includes(t)||(f.state||'').toLowerCase().includes(t))}

  list.sort((a,b)=>{
    if(currentSort==='priority'){
      const pa=a.priority==null?-1:a.priority, pb=b.priority==null?-1:b.priority;
      return (pb-pa)*(sortDir===-1?1:-1);
    }
    if(currentSort==='name'){
      return a.name.localeCompare(b.name)*sortDir;
    }
    const na=getNextDeadline(a), nb=getNextDeadline(b);
    const da=na&&na.date?new Date(na.date).getTime():Infinity;
    const db=nb&&nb.date?new Date(nb.date).getTime():Infinity;
    return (da-db)*sortDir;
  });

  document.querySelectorAll('th.sortable').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.sort===currentSort);
    const ar=th.querySelector('.arrow');
    if(ar){
      if(th.dataset.sort===currentSort){
        ar.textContent = currentSort==='priority' ? (sortDir===-1?'\u2193':'\u2191') : (sortDir===-1?'\u2191':'\u2193');
      } else {
        ar.textContent='\u2195';
      }
    }
  });

  const tb=document.getElementById('tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="6"><div class="empty">No festivals match your filters</div></td></tr>';return}

  tb.innerHTML=list.map(f=>{
    const next=getNextDeadline(f);
    let dlHtml='';
    if(f.deadlines&&f.deadlines.length){
      const sorted=[...f.deadlines].sort((a,b)=>{if(!a.date)return 1;if(!b.date)return -1;return new Date(a.date)-new Date(b.date)});
      dlHtml='<div class="deadlines-row">'+sorted.map(dl=>{
        let cls='';
        if(dl.date){
          const days=daysUntil(dl.date);
          if(days<0) cls='passed';
          else if(next&&dl.date===next.date) cls='current';
        }
        const feeStr=dl.fee!=null?'$'+(Number.isInteger(dl.fee)?dl.fee:dl.fee.toFixed(2)):(dl.fee===0?'Free':'—');
        return `<div class="dl ${cls}"><div class="dl-stage">${esc(dl.stage)}</div><div class="dl-date">${formatDate(dl.date)}</div><div class="dl-fee">${feeStr}</div></div>`;
      }).join('')+'</div>';
    } else {
      dlHtml='<span class="no-dl">TBD</span>';
    }

    const priCls=priorityClass(f.priority);
    const priVal=f.priority==null?'—':f.priority;
    const decCls=decisionClass(f.decision);
    const decText=f.decision||'';
    const apply=f.registrationLink?`<button type="button" class="apply-btn" data-url="${esc(f.registrationLink)}">Apply \u2192</button>`:`<span class="apply-btn disabled">No link</span>`;

    return `<tr>
      <td class="c-pri"><div class="pri-circle ${priCls}">${priVal}</div></td>
      <td class="c-name">
        <strong>${f.registrationLink?`<a href="${esc(f.registrationLink)}" target="_blank" rel="noopener noreferrer" data-url="${esc(f.registrationLink)}">${esc(f.name)}</a>`:esc(f.name)}</strong>
        <div class="sub">${esc(f.state||'')}</div>
      </td>
      <td class="c-decision">${decText?`<span class="decision ${decCls}">${esc(decText)}</span>`:''}</td>
      <td class="c-deadlines">${dlHtml}</td>
      <td class="c-format"><div class="format-text" title="${esc(f.formatApply||'')}">${esc(f.formatApply||'')}</div></td>
      <td class="c-apply">${apply}</td>
    </tr>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value;render()});

document.querySelectorAll('.chip[data-filter]').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.chip[data-filter]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    currentFilter=c.dataset.filter;
    render();
  });
});

document.querySelectorAll('.chip[data-sort]').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('.chip[data-sort]').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    if(currentSort===c.dataset.sort) sortDir*=-1; else {currentSort=c.dataset.sort; sortDir=c.dataset.sort==='priority'?-1:1}
    render();
  });
});

document.querySelectorAll('th.sortable').forEach(th=>{
  th.addEventListener('click',()=>{
    const s=th.dataset.sort;
    if(currentSort===s) sortDir*=-1; else {currentSort=s; sortDir=s==='priority'?-1:1}
    document.querySelectorAll('.chip[data-sort]').forEach(x=>x.classList.toggle('active',x.dataset.sort===s));
    render();
  });
});

// Delegated click handler for Apply buttons and Festival Name links — bulletproof URL opening
document.getElementById('tbody').addEventListener('click', e=>{
  const target = e.target.closest('[data-url]');
  if(!target) return;
  const url = target.dataset.url;
  if(!url) return;
  e.preventDefault();
  e.stopPropagation();
  window.open(url, '_blank', 'noopener,noreferrer');
});

renderSummary();
render();
</script>
</body>
</html>
